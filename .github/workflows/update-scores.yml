name: Actualizar resultados Mundial 2026

on:
  schedule:
    - cron: '0 6,12,18,23 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run score updater
        run: node scripts/update-scores.mjs

      - name: Commit and push if index.html changed
        run: |
          if git diff --quiet -- index.html; then
            echo "No hay cambios."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "chore: actualizar resultados Mundial 2026 ($(date -u +%Y-%m-%d))"
          git push
